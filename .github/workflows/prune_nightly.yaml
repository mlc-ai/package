# This workflow prunes the pip nightly wheel repo to remove old nightly builds
# (to keep the storage cost minimal). We also synchronize the wheel release page
# in the main website to list all the latest wheels uploaded.
name: Prune-Nightly


on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    # Self-contained per-package projects and repo config do not affect the
    # nightly TVM/MLC-LLM wheel pipelines; skip them for such changes.
    paths-ignore:
      - 'packages/**'
      - '.github/**'
      - '.gitignore'
  schedule:
    - cron: '0 11 * * *' # 10 AM UTC

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Wheel-Site-Checkout
      if: github.ref == 'refs/heads/main'
      env:
        GITHUB_TOKEN: ${{ secrets.MLC_AI_BOT_GITHUB_TOKEN }}
      run: |
        git clone https://$GITHUB_TOKEN@github.com/mlc-ai/wheels
        cd wheels
        git config user.name mlc-bot
        git config user.email 106439794+mlc-bot@users.noreply.github.com
        cd ..
    - name: Wheel-Prune-Sync
      if: github.ref == 'refs/heads/main'
      env:
        GITHUB_TOKEN: ${{ secrets.MLC_AI_BOT_GITHUB_TOKEN }}
      run: >-
        python -m pip install pyOpenSSL --upgrade &&
        python -m pip install github3.py requests &&
        python scripts/wheel_prune_and_sync.py --site-path wheels --repo mlc-ai/package
