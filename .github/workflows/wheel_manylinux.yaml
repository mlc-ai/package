# GH actions.
#
# Unified wheel build for mlc-ai and mlc-llm on manylinux (nightly + stable).
#
# Triggers:
#   * schedule          -> nightly build. Package names mlc-ai-nightly-* /
#                          mlc-llm-nightly-*, built from the tip of origin/mlc (tvm)
#                          and origin/main (mlc-llm).
#   * pull_request      -> nightly build for CI only. The deploy step is skipped
#                          (guarded by `github.ref == 'refs/heads/main'`).
#   * workflow_dispatch -> stable release build. Package names mlc-ai-* / mlc-llm-*,
#                          built from the `tag` input. The same tag is checked out in
#                          both mlc-ai/relax and mlc-ai/mlc-llm (via MLC_STABLE_BUILD_VER,
#                          see sync_package.py), so it must exist in both repos. Each
#                          stable VERSION is its own prune group, so it stays on the
#                          index permanently.
#
# Usage (stable): Actions -> "Wheel-Manylinux" -> Run workflow -> tag = v0.20.0
name: Wheel-Manylinux

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Stable release tag to build; must exist in both mlc-ai/relax and mlc-ai/mlc-llm (e.g. v0.20.0)"
        required: true
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 6 * * *' # 6 AM UTC

jobs:
  Build:
    strategy:
      matrix:
        # matrix of build configs
        config:
          - gpu: 'none'
            image: 'mlcaidev/package-cpu:655adb5'
          - gpu: 'cuda-12.8'
            image: 'mlcaidev/package-cu128:655adb5'
          - gpu: 'cuda-13.0'
            image: 'mlcaidev/package-cu130:655adb5'
          - gpu: 'rocm-6.1'
            image: 'mlcaidev/package-rocm61:655adb5'
          - gpu: 'rocm-6.2'
            image: 'mlcaidev/package-rocm62:655adb5'

    runs-on: [self-hosted, Linux, X64]
    env:
      # 'stable' on a manual (workflow_dispatch) run, 'nightly' otherwise
      # (scheduled nightly build or pull_request CI).
      PKG_KIND: ${{ github.event_name == 'workflow_dispatch' && 'stable' || 'nightly' }}
      # Empty for nightly; the requested tag for stable. sync_package.py checks this
      # tag out for stable builds and errors out if it is empty on a stable build.
      MLC_STABLE_BUILD_VER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || '' }}

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: 'recursive'
    - name: Setup script env
      run: |
        rm -rf conda
        ln -s 3rdparty/tlcpack/conda conda
    - name: Checkout source
      run: |
        git clone https://github.com/mlc-ai/relax tvm --recursive
        git clone https://github.com/mlc-ai/mlc-llm mlc-llm --recursive
    - name: Sync MLC AI Package
      run: |
        python3 scripts/sync_package.py --gpu ${{ matrix.config.gpu }} --package tvm --package-name ${{ env.PKG_KIND == 'nightly' && 'mlc-ai-nightly' || 'mlc-ai' }} --revision origin/mlc ${{ env.PKG_KIND == 'nightly' && '--skip-checkout' || '' }}
    - name: Sync MLC LLM Package
      run: |
        python3 scripts/sync_package.py --gpu ${{ matrix.config.gpu }} --package mlc-llm --package-name ${{ env.PKG_KIND == 'nightly' && 'mlc-llm-nightly' || 'mlc-llm' }} --revision origin/main ${{ env.PKG_KIND == 'nightly' && '--skip-checkout' || '' }}
    - name: Build TVM Unity
      uses: gacts/run-and-post-run@v1
      env:
        IMAGE: ${{ matrix.config.image }}
        GPU: ${{ matrix.config.gpu }}
      with:
        run: |
          docker/bash.sh --no-gpu $IMAGE ./scripts/build_mlc_ai_wheel_manylinux.sh --gpu $GPU
        post: |
          docker/bash.sh --no-gpu $IMAGE ./scripts/cleanup_workspace.sh
    - name: Build MLC-LLM
      uses: gacts/run-and-post-run@v1
      env:
        IMAGE: ${{ matrix.config.image }}
        GPU: ${{ matrix.config.gpu }}
      with:
        run: |
          docker/bash.sh --no-gpu $IMAGE ./scripts/build_mlc_llm_wheel_manylinux.sh --gpu $GPU
        post: |
          docker/bash.sh --no-gpu $IMAGE ./scripts/cleanup_workspace.sh
    - name: Wheel-Deploy
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.MLC_AI_BOT_GITHUB_TOKEN }}
      with:
        files: |
          tvm/repaired_wheels/*.whl
          mlc-llm/repaired_wheels/*.whl
        tag_name: v0.9.dev0
        prerelease: true
