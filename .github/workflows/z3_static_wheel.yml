name: Publish Z3 static wheels

on:
  workflow_dispatch:
    inputs:
      z3_tag:
        description: Upstream Z3 tag
        required: true
        default: z3-4.16.0
      publish:
        description: Publish to PyPI
        type: boolean
        required: true
        default: false
      repository_url:
        description: Custom PyPI-compatible repository URL
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build_wheels:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            build: cp311-manylinux_x86_64
            arch: x86_64
            platform_tag: manylinux_2_28_x86_64
          - name: Linux aarch64
            os: ubuntu-24.04-arm
            build: cp311-manylinux_aarch64
            arch: aarch64
            platform_tag: manylinux_2_28_aarch64
          - name: macOS arm64
            os: macos-15
            build: cp311-macosx_arm64
            arch: arm64
            platform_tag: macosx_14_0_arm64
          - name: macOS x86_64
            os: macos-15-intel
            build: cp311-macosx_x86_64
            arch: x86_64
            platform_tag: macosx_14_0_x86_64
          - name: Windows AMD64
            os: windows-2022
            build: cp311-win_amd64
            arch: AMD64
            platform_tag: win_amd64
    steps:
      - uses: actions/checkout@v4
      - name: Build wheel
        uses: ./.github/actions/z3-static-wheel
        with:
          build: ${{ matrix.build }}
          arch: ${{ matrix.arch }}
          platform-tag: ${{ matrix.platform_tag }}
          z3-tag: ${{ inputs.z3_tag }}
      - name: Retag Linux wheel
        if: startsWith(matrix.platform_tag, 'manylinux_')
        run: |
          python -m pip install wheel
          python -m wheel tags --remove --platform-tag "${{ matrix.platform_tag }}" wheelhouse/*.whl
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: z3-static-wheel-${{ matrix.platform_tag }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        working-directory: packages/z3-static
        run: |
          python -m pip install build
          python -m build --sdist
      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: z3-static-sdist
          path: packages/z3-static/dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish distributions
    needs: [build_wheels, build_sdist]
    if: ${{ inputs.publish }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: z3-static-*
          path: dist
          merge-multiple: true
      - name: List distributions
        run: ls -l dist
      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"
      - name: Publish to PyPI
        if: ${{ inputs.repository_url == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
      - name: Publish to custom repository
        if: ${{ inputs.repository_url != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: ${{ inputs.repository_url }}

