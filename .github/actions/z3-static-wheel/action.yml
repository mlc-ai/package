name: Build Z3 static wheel
description: Build a z3-static wheel for one platform
inputs:
  build:
    description: cibuildwheel build selector
    required: true
  arch:
    description: cibuildwheel target architecture
    required: true
  platform-tag:
    description: Python wheel platform tag
    required: true
  z3-tag:
    description: Upstream Z3 git tag
    required: true
runs:
  using: composite
  steps:
    - name: Stamp package version
      shell: bash
      run: |
        set -euo pipefail
        version="${{ inputs.z3-tag }}"
        version="${version#z3-}"
        printf '%s\n' \
          '"""Version generated from the upstream Z3 release tag."""' \
          '' \
          "__version__ = \"${version}\"" \
          > packages/z3-static/z3_static/_version.py
    - name: Build wheel
      uses: pypa/cibuildwheel@298ed2fb2c105540f5ed055e8a6ad78d82dd3a7e # v3.3.1
      env:
        CIBW_BUILD: ${{ inputs.build }}
        CIBW_ARCHS_LINUX: ${{ inputs.arch }}
        CIBW_ARCHS_MACOS: ${{ inputs.arch }}
        CIBW_ARCHS_WINDOWS: ${{ inputs.arch }}
        CIBW_BUILD_VERBOSITY: "1"
        CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
        CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
        CIBW_BEFORE_ALL_LINUX: >-
          dnf install -y gcc-toolset-13-gcc gcc-toolset-13-gcc-c++ &&
          /opt/rh/gcc-toolset-13/root/usr/bin/g++ --version
        CIBW_ENVIRONMENT_LINUX: >-
          STATICLIB_Z3_TAG="${{ inputs.z3-tag }}"
          STATICLIB_Z3_ALLOW_SOURCE_BUILD=1
          STATICLIB_Z3_PLAT_NAME="${{ inputs.platform-tag }}"
          PATH="/opt/rh/gcc-toolset-13/root/usr/bin:$PATH"
          CC=gcc CXX=g++
        CIBW_ENVIRONMENT_MACOS: >-
          STATICLIB_Z3_TAG="${{ inputs.z3-tag }}"
          STATICLIB_Z3_ALLOW_SOURCE_BUILD=1
          STATICLIB_Z3_PLAT_NAME="${{ inputs.platform-tag }}"
          MACOSX_DEPLOYMENT_TARGET=14.0
        CIBW_ENVIRONMENT_WINDOWS: >-
          STATICLIB_Z3_TAG="${{ inputs.z3-tag }}"
          STATICLIB_Z3_ALLOW_SOURCE_BUILD=1
          STATICLIB_Z3_PLAT_NAME="${{ inputs.platform-tag }}"
        CIBW_REPAIR_WHEEL_COMMAND_LINUX: bash -c 'mkdir -p "{dest_dir}" && cp "{wheel}" "{dest_dir}/"'
        CIBW_REPAIR_WHEEL_COMMAND_MACOS: bash -c 'mkdir -p "{dest_dir}" && cp "{wheel}" "{dest_dir}/"'
        CIBW_TEST_REQUIRES: cmake
        CIBW_TEST_COMMAND: python {project}/packages/z3-static/scripts/smoke_test_staticlib.py
      with:
        package-dir: packages/z3-static
        output-dir: wheelhouse

