[build-system]
requires = ["scikit-build-core>=0.11", "cmake>=3.26", "ninja"]
build-backend = "scikit_build_core.build"

[project]
name = "mlc-z3-static"
dynamic = ["version"]
description = "Prebuilt Z3 4.16.0 static and shared libraries, headers, and CMake metadata"
readme = "README.md"
requires-python = ">=3.8"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "MLC AI", email = "mlc.ai.dev@gmail.com" }]
keywords = ["z3", "smt", "static-library", "cmake"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: C++",
  "Topic :: Software Development :: Build Tools",
]

[project.urls]
Repository = "https://github.com/mlc-ai/package"
Z3 = "https://github.com/Z3Prover/z3"

[tool.scikit-build]
cmake.version = ">=3.26"
wheel.py-api = "py3"
wheel.packages = ["src/mlc_z3_static"]
sdist.exclude = [
  "build",
  "dist",
  "wheelhouse",
  "example_project/build",
  "example_project/.venv",
  "src/mlc_z3_static/static",
  "src/mlc_z3_static/shared",
  "src/mlc_z3_static/licenses",
  "src/mlc_z3_static/staticlib.json",
]

[tool.scikit-build.metadata.version]
provider = "scikit_build_core.metadata.regex"
input = "src/mlc_z3_static/_version.py"

[tool.cibuildwheel]
# CIBW_BUILD selects the Python used to run the build. scikit-build-core tags
# the output wheel py3-none because this package exposes native development
# artifacts, not a CPython ABI extension.
build = "cp311-*"
build-frontend = "build"
build-verbosity = 1
skip = "*-musllinux_* pp*"
test-requires = ["cmake", "ninja"]
test-command = "python {project}/scripts/smoke_test_mlc_z3_static.py"

[tool.cibuildwheel.environment]
MLC_Z3_STATIC_ALLOW_SOURCE_BUILD = "1"

[tool.cibuildwheel.linux]
manylinux-x86_64-image = "manylinux_2_28"
manylinux-aarch64-image = "manylinux_2_28"
repair-wheel-command = "python scripts/copy_wheel.py {wheel} {dest_dir}"

[tool.cibuildwheel.macos]
repair-wheel-command = "python scripts/copy_wheel.py {wheel} {dest_dir}"
