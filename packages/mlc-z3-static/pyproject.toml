[build-system]
requires = [
  "setuptools>=77",
  "wheel>=0.43",
]
build-backend = "setuptools.build_meta"

[project]
name = "mlc-z3-static"
version = "4.16.0"
description = "Prebuilt Z3 4.16.0 static and shared libraries, headers, and CMake metadata"
readme = "README.md"
requires-python = ">=3.8"
license = "MIT"
authors = [{ name = "MLC AI", email = "mlc.ai.dev@gmail.com" }]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: C++",
  "Topic :: Software Development :: Build Tools",
]

[project.urls]
Repository = "https://github.com/mlc-ai/package"
Z3 = "https://github.com/Z3Prover/z3"

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true
zip-safe = false

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
mlc_z3_static = [
  "py.typed",
  "*.json",
  "licenses/*",
  "shared/**/*",
  "static/**/*",
]

[tool.cibuildwheel]
# CIBW_BUILD selects the Python used to run the build. setup.py overrides the
# output wheel tag to py3-none because this package exposes native development
# artifacts, not a CPython ABI extension.
build = "cp311-*"
build-frontend = "build"
build-verbosity = 1
skip = "*-musllinux_* pp*"
before-build = "python -m pip install cmake ninja && python scripts/prepare_z3_v4_16_0.py"
test-requires = ["cmake", "ninja"]
test-command = "python {project}/scripts/smoke_test_mlc_z3_static.py"

[tool.cibuildwheel.linux]
manylinux-x86_64-image = "manylinux_2_28"
manylinux-aarch64-image = "manylinux_2_28"
repair-wheel-command = "python scripts/copy_wheel.py {wheel} {dest_dir}"

[tool.cibuildwheel.macos]
repair-wheel-command = "python scripts/copy_wheel.py {wheel} {dest_dir}"
