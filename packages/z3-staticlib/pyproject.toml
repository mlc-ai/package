[build-system]
requires = ["setuptools>=68", "wheel", "packaging", "cmake>=3.26", "ninja"]
build-backend = "setuptools.build_meta"

[project]
name = "z3-staticlib"
dynamic = ["version"]
description = "Static Z3 development artifacts for native build systems"
readme = "README.md"
requires-python = ">=3.8"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "MLC AI", email = "mlc.ai.dev@gmail.com" }]
keywords = ["z3", "smt", "static-library", "cmake"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Topic :: Software Development :: Build Tools",
]

[project.urls]
Repository = "https://github.com/mlc-ai/package"

[tool.setuptools]
packages = ["z3_staticlib"]
include-package-data = true

[tool.setuptools.package-data]
z3_staticlib = ["static/**/*"]

[tool.setuptools.dynamic]
version = { attr = "z3_staticlib.__version__" }

